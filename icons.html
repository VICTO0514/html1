<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Width Social Media Bar</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f0f2f5;
  }

  /* FULL WIDTH SOCIAL BAR */
  .social-bar-full {
    width: 100%;                /* full width */
    background-color: #fcf00042;      /* white background */
    padding: 20px 0;            /* vertical padding */
    display: flex;
    justify-content: space-around; /* spread icons evenly from start to end */
    align-items: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  .social-bar-full a {
    display: inline-block;
    width: 50px;
    height: 50px;
    transition: transform 0.3s, filter 0.3s;
  }

  .social-bar-full a img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .social-bar-full a:hover {
    transform: scale(1.2);
    filter: brightness(1.2);
  }

  @media screen and (max-width: 600px) {
    .social-bar-full a {
      width: 40px;
      height: 40px;
    }
  }
</style>
</head>
<body>

<!-- FULL WIDTH SOCIAL MEDIA BAR -->
<div class="social-bar-full">
  <a href="https://www.facebook.com" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" alt="Facebook">
  </a>
  <a href="https://www.twitter.com" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitter.svg" alt="Twitter">
  </a>
  <a href="https://www.instagram.com" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">
  </a>
  <a href="https://www.linkedin.com" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg" alt="LinkedIn">
  </a>
  <a href="https://www.youtube.com" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube">
  </a>
</div>

</body>
</html>
